<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>klara &amp; szymon — zaproszenie</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #FFFFFF;
    --ink: #111111;
    --soft: #F5F5F4;
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--soft);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Screen layout — two A6 cards side by side ─────────────────────── */

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 24px;
    flex-wrap: wrap;
  }

  .toolbar {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 50;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .toolbar a, .toolbar button {
    background: white;
    border: 1px solid rgba(17,17,17,0.18);
    color: var(--ink);
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background 160ms;
  }
  .toolbar a:hover, .toolbar button:hover {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }

  /* A6 card — 105 × 148 mm. On screen we show at scaled px. */
  .card {
    background: var(--paper);
    width: 360px;
    aspect-ratio: 105 / 148; /* A6 portrait */
    padding: 28px;
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    align-items: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    position: relative;
  }
  @media (min-width: 900px) {
    .card { width: 420px; padding: 32px; }
  }

  .card-label {
    position: absolute;
    top: -22px;
    left: 0;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(17,17,17,0.4);
    font-weight: 500;
  }

  /* ── Card 1 (front) ─────────────────────────────────────────────────── */

  .front {
    text-align: center;
  }
  .front .top {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--ink);
    align-self: start;
    padding-top: 16px;
  }
  .front h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(46px, 6.5vw, 60px);
    line-height: 1.0;
    letter-spacing: -0.01em;
    margin: 0;
    color: var(--ink);
    text-align: center;
  }
  .front .bottom {
    align-self: end;
    padding-bottom: 16px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--ink);
  }

  /* ── Card 2 (back) ──────────────────────────────────────────────────── */

  .back {
    grid-template-rows: auto 1fr auto;
    text-align: center;
    gap: 18px;
  }
  .back .heart {
    margin: 8px auto 0;
    width: 48px;
    height: 56px;
  }
  .back .invite-line {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--ink);
    line-height: 1.4;
    margin: 0;
  }
  .back .qr {
    width: 168px;
    height: 168px;
    margin: 4px auto;
    display: block;
  }
  .back .qr-caption {
    font-family: var(--sans);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(17,17,17,0.55);
    margin-top: 6px;
  }
  .back .meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    text-align: left;
    margin-top: auto;
    align-self: end;
    padding-top: 8px;
  }
  .back .meta .col {
    font-family: var(--sans);
    font-size: 9px;
    line-height: 1.45;
    letter-spacing: 0.06em;
    color: var(--ink);
    font-weight: 500;
  }
  .back .meta strong {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    display: block;
    margin-bottom: 4px;
    font-size: 9px;
  }
  .back .meta .col em {
    font-style: normal;
    font-weight: 700;
  }

  /* Body card — this is where the central content (heart+invite+qr+to our wedding) lives */
  .back-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
  }

  /* ── Print — A6 portrait, one card per page ─────────────────────────── */

  @media print {
    @page {
      size: 105mm 148mm;
      margin: 0;
    }
    html, body {
      background: white;
    }
    .toolbar { display: none !important; }
    .page {
      padding: 0;
      min-height: 0;
      gap: 0;
      display: block;
    }
    .card-label { display: none !important; }
    .card {
      width: 105mm !important;
      height: 148mm !important;
      aspect-ratio: auto;
      padding: 12mm 10mm !important;
      box-shadow: none !important;
      page-break-after: always;
      break-after: page;
      margin: 0 !important;
    }
    .card:last-child {
      page-break-after: auto;
      break-after: auto;
    }
    .back .qr { width: 38mm; height: 38mm; }
    .back .heart { width: 11mm; height: 13mm; }
    .front h1 { font-size: 38pt; }
  }

  /* On very small screens stack the cards */
  @media (max-width: 760px) {
    .page { flex-direction: column; padding: 80px 16px 32px; gap: 32px; }
    .card-label { position: static; margin-bottom: 8px; }
    .card { width: min(360px, 100%); }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a href="/">← powrót</a>
  <button onclick="window.print()">🖨 drukuj</button>
</div>

<div class="page">

  <!-- FRONT -->
  <div class="card-wrap">
    <div class="card-label">A6 — front</div>
    <article class="card front" aria-label="zaproszenie — front">
      <div class="top">LET'S CELEBRATE.</div>
      <h1>KLARA &amp;<br>SZYMON</h1>
      <div class="bottom">15.08.26</div>
    </article>
  </div>

  <!-- BACK -->
  <div class="card-wrap">
    <div class="card-label">A6 — back</div>
    <article class="card back" aria-label="zaproszenie — rewers z kodem qr">
      <div class="back-body">
        <svg class="heart" viewBox="0 0 48 56" aria-hidden="true">
          <path d="M24 50 C 18 44, 6 36, 6 22 C 6 14, 12 8, 18 8 C 21 8, 24 10, 24 14 C 24 10, 27 8, 30 8 C 36 8, 42 14, 42 22 C 42 36, 30 44, 24 50 Z"
                fill="none" stroke="#111" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <p class="invite-line">
          IT'S HAPPENING.<br>
          WE ARE DELIGHTED TO INVITE YOU
        </p>

        <object class="qr" type="image/svg+xml" data="img/rsvp-qr.svg" aria-label="kod QR — RSVP na klaraiszymon.pl">
          <img src="img/rsvp-qr.svg" alt="kod QR — klaraiszymon.pl/#rsvp" style="width:100%;height:100%;">
        </object>
        <div class="qr-caption">scan · rsvp on klaraiszymon.pl</div>

        <p class="invite-line">TO OUR WEDDING</p>
      </div>

      <div class="meta">
        <div class="col">
          <strong>august 15, 2026</strong>
          cocktail hour <em>3PM</em><br>
          ceremony <em>4PM</em>
        </div>
        <div class="col">
          <strong>ceremony &amp; reception</strong>
          wrocław golf club,<br>
          kryniczno 55-104
        </div>
      </div>
    </article>
  </div>

</div>

<script>
  // Allow ?print=1 to auto-trigger print dialog (useful for sharing a print link)
  if (new URLSearchParams(location.search).has('print')) {
    window.addEventListener('load', () => setTimeout(() => window.print(), 400));
  }
</script>

</body>
</html>
