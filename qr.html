<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>klara &amp; szymon — qr</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: hsl(51.66 36.3% 95.56%);
    --ink: #2E2E2E;
    --paper: #FFFCF0;
    --rule: rgba(46, 46, 46, 0.18);
    --rule-strong: rgba(46, 46, 46, 0.5);
    --muted: rgba(46, 46, 46, 0.62);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .smallcaps {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .page {
    padding: 80px 32px 64px;
    display: flex;
    justify-content: center;
  }

  .card {
    width: 100%;
    max-width: 540px;
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 48px 48px 40px;
    display: grid;
    gap: 24px;
    text-align: center;
  }

  .masthead {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    color: var(--muted);
  }
  .masthead .center {
    font-family: var(--serif);
    font-style: italic;
    font-size: 28px;
    color: var(--ink);
  }
  .rule {
    height: 1px;
    background: var(--rule);
  }

  .qr-wrap {
    position: relative;
    width: 100%;
    max-width: 300px;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
  }
  .qr-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .qr-monogram {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 18%;
    aspect-ratio: 1 / 1;
    background: var(--paper);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    color: var(--ink);
    box-shadow: 0 0 0 4px var(--paper);
  }

  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1;
    letter-spacing: -0.03em;
    margin: 0;
  }
  h1 em { font-style: italic; font-weight: 300; }

  .lead {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 18px;
    color: var(--muted);
    margin: 0;
    max-width: 380px;
    margin-inline: auto;
    line-height: 1.45;
  }

  .url {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--ink);
    word-break: break-all;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 14px 0;
  }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid var(--rule-strong);
    color: var(--ink);
    padding: 14px 22px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 160ms ease, color 160ms ease;
  }
  .btn:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .btn[aria-disabled="true"] { opacity: 0.4; pointer-events: none; }

  .footer {
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding-top: 8px;
    border-top: 1px solid var(--rule);
  }

  /* Print: just the card, big QR, no UI */
  @media print {
    @page { size: A6 portrait; margin: 8mm; }
    html, body { background: white; }
    .page { padding: 0; min-height: auto; }
    .card { border: none; padding: 0; gap: 16px; max-width: none; background: white; }
    .actions, .back { display: none !important; }
    .qr-wrap { max-width: 80mm; }
    .url { font-size: 9pt; }
    h1 { font-size: 28pt; }
    .lead { font-size: 11pt; }
  }

  .back {
    position: fixed;
    top: 24px;
    left: 24px;
    color: var(--ink);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .back .smallcaps {
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
  }
</style>
</head>
<body>

<a class="back" href="/">
  <span style="font-family: var(--serif); font-style: italic; font-size: 18px;">←</span>
  <span class="smallcaps" data-i18n="back">powrót</span>
</a>

<div class="page">
  <div class="card">

    <div class="masthead">
      <span class="smallcaps">vol. 01 — wrocław</span>
      <span class="center"><img src="img/logo.svg" alt="k & s" style="height: 32px; width: auto; display: inline-block; vertical-align: middle;"></span>
      <span class="smallcaps" style="text-align: right;">summer mmxxvi</span>
    </div>

    <div class="rule"></div>

    <span class="smallcaps" style="color: var(--muted);" data-i18n="kicker">§04 — rsvp · zeskanuj</span>

    <h1 data-i18n="title">dajcie <em>znać</em><br>czy <em>będziecie</em>.</h1>

    <p class="lead" data-i18n="lead">
      zeskanuj kod telefonem — wypełnij formularz w dwie minuty. potwierdzenie przyjdzie mailem.
    </p>

    <div class="qr-wrap">
      <object type="image/svg+xml" data="img/rsvp-qr.svg" aria-label="kod QR prowadzący do formularza RSVP">
        <img src="img/rsvp-qr.svg" alt="kod QR — klaraiszymon.pl/#rsvp" style="width:100%;height:100%;">
      </object>
      <div class="qr-monogram" aria-hidden="true"><img src="img/logo.svg" alt="" style="width: 80%; height: auto;"></div>
    </div>

    <p class="url">klaraiszymon.pl/#rsvp</p>

    <div class="actions">
      <a class="btn" href="img/rsvp-qr.svg" download="klara-szymon-rsvp-qr.svg" data-i18n="download">
        ↓ pobierz svg
      </a>
      <button class="btn" onclick="window.print()" data-i18n="print">
        🖨 drukuj
      </button>
    </div>

    <div class="footer">
      <span class="smallcaps">15 · viii · mmxxvi</span>
      <span class="smallcaps" data-i18n="footerRight">k&amp;s · cocktail · ślub</span>
    </div>

  </div>
</div>

<script>
  (function () {
    var STR = {
      pl: {
        back: 'powrót',
        kicker: '§04 — rsvp · zeskanuj',
        title: 'dajcie <em>znać</em><br>czy <em>będziecie</em>.',
        lead:  'zeskanuj kod telefonem — wypełnij formularz w dwie minuty. potwierdzenie przyjdzie mailem.',
        download: '↓ pobierz svg',
        print:    '🖨 drukuj',
        footerRight: 'k&s · cocktail · ślub',
      },
      en: {
        back: 'back',
        kicker: '§04 — rsvp · scan',
        title: 'tell us if<br>you\'re <em>coming</em>.',
        lead:  'scan the code — fill the form in two minutes. confirmation will arrive by email.',
        download: '↓ download svg',
        print:    '🖨 print',
        footerRight: 'k&s · cocktail · wedding',
      },
    };
    function pickLang() {
      var fromUrl = new URLSearchParams(location.search).get('lang');
      if (fromUrl === 'pl' || fromUrl === 'en') return fromUrl;
      try {
        var saved = localStorage.getItem('ks2026_lang');
        if (saved === 'pl' || saved === 'en') return saved;
      } catch (e) {}
      return (navigator.language || '').indexOf('pl') === 0 ? 'pl' : 'en';
    }
    var lang = pickLang();
    document.documentElement.lang = lang;
    var dict = STR[lang] || STR.pl;
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (dict[key]) el.innerHTML = dict[key];
    });
  })();
</script>

</body>
</html>
