<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    /* cream warmth = 61 → hsl(48 + 0.61*6, 18 + 0.61*30, 98 - 0.61*4) */
    --cream: hsl(51.66 36.3% 95.56%);
    --ink: #2E2E2E;
    --paper: #FFFFFF;
    --rule: rgba(46, 46, 46, 0.18);
    --rule-strong: rgba(46, 46, 46, 0.5);
    --muted: rgba(46, 46, 46, 0.62);

    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  .smallcaps {
    font-family: var(--sans);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 11px;
    font-weight: 500;
  }
  .serif { font-family: var(--serif); }
  .ital { font-style: italic; }
  .hairline { background: var(--rule); }
  .rule-h { height: 1px; width: 100%; background: var(--rule); }
  .rule-v { width: 1px; background: var(--rule); }

  .bw { filter: grayscale(100%) contrast(1.02); }
  .bw img { display: block; width: 100%; height: 100%; object-fit: cover; }

  ::selection { background: var(--ink); color: var(--cream); }

  /* Default styling for <em> in headings (used by i18n strings with inline emphasis) */
  h1 em, h2 em, h3 em, h4 em {
    font-weight: 300;
    font-style: italic;
  }

  /* ── Responsive scaling helpers ─────────────────────────────────────── */
  /* Use --pad-x in inline styles for section side-padding so mobile shrinks. */
  :root {
    --pad-x: 56px;
  }
  @media (max-width: 768px) {
    :root { --pad-x: 24px; }
    body { font-size: 14px; }
  }
  @media (max-width: 420px) {
    :root { --pad-x: 18px; }
  }

  /* Hamburger button (only used on mobile via display rule) */
  .nav-hamburger {
    display: none;
    background: transparent;
    border: 1px solid var(--rule-strong);
    width: 38px;
    height: 38px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .nav-hamburger span {
    display: block;
    width: 16px;
    height: 1px;
    background: var(--ink);
    position: relative;
  }
  .nav-hamburger span::before,
  .nav-hamburger span::after {
    content: '';
    position: absolute;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--ink);
  }
  .nav-hamburger span::before { top: -5px; }
  .nav-hamburger span::after  { top:  5px; }

  @media (max-width: 768px) {
    .nav-desktop-items { display: none !important; }
    .nav-desktop-date  { display: none !important; }
    .nav-hamburger { display: inline-flex !important; }

    /* Force grid containers with .stack-mobile to single column */
    .stack-mobile {
      display: block !important;
      margin-right: 0 !important;
    }
    .stack-mobile > * + * { margin-top: 32px; }
    /* Vertical 1px divider columns become horizontal dividers in stacked flow */
    .stack-mobile > .vdiv {
      width: 100% !important;
      height: 1px !important;
      background: var(--rule);
    }
  }

  /* RSVP step fade-in (used by .rsvp-step-fade injected from rsvp.jsx) */
  @keyframes rsvp-fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
